<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Paxos Sequence Diagram</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a1a;
    color: #ddd;
    font-family: "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}
#toolbar {
    background: #252525;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
    flex-wrap: wrap;
}
#toolbar .stats { font-size: 13px; color: #aaa; }
#toolbar label { font-size: 13px; color: #ccc; }
#toolbar input[type=range] { width: 120px; vertical-align: middle; }
.legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    font-size: 12px;
}
.legend span {
    display: flex;
    align-items: center;
    gap: 4px;
}
.legend .swatch {
    display: inline-block;
    width: 20px;
    height: 3px;
    border-radius: 1px;
}
#container {
    flex: 1;
    overflow: auto;
    position: relative;
}
#tooltip {
    display: none;
    position: fixed;
    background: #333;
    color: #eee;
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 13px;
    font-family: monospace;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
}
svg .msg {
    cursor: pointer;
    transition: opacity 0.1s;
}
svg .msg:hover, svg .msg.split-hl {
    opacity: 1 !important;
    filter: brightness(1.4);
}
</style>
</head>

<div id="tooltip"></div>
<script>
const svg = document.getElementById('diagram');
const tooltip = document.getElementById('tooltip');
const zoomSlider = document.getElementById('zoom');
const zoomVal = document.getElementById('zoom-val');
const baseW = 700;
const baseH = 27329;

zoomSlider.addEventListener('input', () => {
    const z = parseFloat(zoomSlider.value);
    zoomVal.textContent = z.toFixed(1) + 'x';
    svg.style.transform = `scale(${z})`;
    svg.style.width = (baseW * z) + 'px';
    svg.style.height = (baseH * z) + 'px';
});

let curSplit = null;
svg.addEventListener('mousemove', (e) => {
    const el = e.target;
    if (el.classList.contains('msg') && el.dataset.tip) {
        tooltip.textContent = el.dataset.tip;
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 28) + 'px';
        const sid = el.dataset.split;
        if (sid !== undefined && sid !== curSplit) {
            if (curSplit !== null)
                svg.querySelectorAll('[data-split="'+curSplit+'"]').forEach(
                    n => n.classList.remove('split-hl'));
            svg.querySelectorAll('[data-split="'+sid+'"]').forEach(
                n => n.classList.add('split-hl'));
            curSplit = sid;
        } else if (sid === undefined && curSplit !== null) {
            svg.querySelectorAll('[data-split="'+curSplit+'"]').forEach(
                n => n.classList.remove('split-hl'));
            curSplit = null;
        }
    } else {
        tooltip.style.display = 'none';
        if (curSplit !== null) {
            svg.querySelectorAll('[data-split="'+curSplit+'"]').forEach(
                n => n.classList.remove('split-hl'));
            curSplit = null;
        }
    }
});
svg.addEventListener('mouseleave', () => {
    tooltip.style.display = 'none';
    if (curSplit !== null) {
        svg.querySelectorAll('[data-split="'+curSplit+'"]').forEach(
            n => n.classList.remove('split-hl'));
        curSplit = null;
    }
});
</script>
